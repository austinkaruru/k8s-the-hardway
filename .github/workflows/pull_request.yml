name: Create Pull Request into gcp branch

on:
  push:
    branches:
      - k8s-tf
jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create Pull Request
        uses: actions/pull-request@v4
        with:
          title: 'Update gcp branch with changes from k8s-tf'
          body: 'This pull request updates the gcp branch with the latest changes from k8s-tf.'
