site_name: K8s The Hard Way - My Learning Journey
site_description: A personal journey through Kubernetes internals with Infrastructure as Code
site_author: Austin
site_url: https://github.com/austinkaruru/k8s-the-hardway

nav:
  - Home: index.md
  - Getting Started:
    - Prerequisites: setup/prerequisites.md
    - GCP Setup: setup/gcp-setup.md
    - SSH Configuration: setup/ssh-setup.md
  - Infrastructure Journey:
    - Why Terraform?: infrastructure/terraform-overview.md
    - Deployment Day: infrastructure/terraform-deployment.md
    - Testing Everything: infrastructure/validation.md
  - The Hard Way Begins:
    - Starting the Journey: kubernetes/manual-setup.md
    - Setting Up Jumpbox: kubernetes/jumpbox.md
    - Control Plane Setup: kubernetes/control-plane.md
    - Worker Nodes: kubernetes/worker-nodes.md
    - Victory Lap: kubernetes/cluster-validation.md
  - Lessons & Reflections:
    - What I Learned: lessons/what-i-learned.md
    - When Things Broke: lessons/troubleshooting.md
    - Tips for Others: lessons/tips-and-tricks.md
  - About This Journey: about.md

theme:
  name: material
  
  # Modern, edgy color scheme
  palette:
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  # Modern typography
  font:
    text: Inter
    code: JetBrains Mono
  
  # Kubernetes logo and favicon
  logo: img/favicon.ico
  favicon: img/favicon.ico
  
  features:
    # Modern navigation features
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tooltips
    - content.tabs.link
  
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: material/kubernetes

# Modern extras
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/austinkaruru
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/austin-karuru/
      name: LinkedIn
  
  # Personal touch
  generator: false  # Remove "Made with Material for MkDocs"
  
  # Modern analytics (optional)
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            <a href="https://github.com/your-username/k8s-the-hardway/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">telling us what you found lacking</a>.

# Basic plugins that work reliably
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

markdown_extensions:
  # Essential for code and technical content
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  # Modern formatting
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  
  # Personal touch extensions
  - pymdownx.emoji
  
  # Better typography
  - pymdownx.smartsymbols
  - smarty

# Modern, edgy custom CSS
extra_css:
  - stylesheets/modern-edgy-style.css

# Modern copyright
copyright: |
  &copy; 2025 <strong>Austin Karuru</strong> - Kubernetes The Hard Way Journey 
  <br><small>Built with ❤️ and lots of ☕</small>